[llm]
model = "flash"
api_key_env = "DEEPSEEK_API_KEY"
base_url = "https://api.deepseek.com"
temperature = 0.3
max_tokens = 4096
request_timeout_ms = 120000
thinking = "enabled"
reasoning_effort = "high"

[agent]
max_iterations = 50
workspace = "."
# Leave system_prompt empty to use the built-in Constitution prompt
# (prompts/base.md). Set a string here only to fully override it.
system_prompt = ""

[snapshots]
enabled = true
retention_days = 7

[subagents]
max_agents = 4
max_depth = 2

[lsp]
enabled = true
include_warnings = false
poll_after_edit_ms = 6000
max_per_file = 20

